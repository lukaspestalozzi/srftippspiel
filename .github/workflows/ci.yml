name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install and test
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
          python -m pytest -rA

  artifacts:
    name: ${{ matrix.name }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default config (config.yaml = FIFA World Cup 2026) unless --config is given.
          - name: validate-data
            args: validate-data
            artifact: validate-data-log
            path: output/validate-data.log
          - name: predict
            args: predict
            artifact: predict-report
            path: output/report.html
          - name: run
            args: run
            artifact: run-report
            path: output/report.html
          # Rank-optimising strategy: tips that aim to WIN the pool by anticipating the field.
          - name: run-rankopt
            args: run --strategy rank_optimizing
            artifact: run-rankopt-report
            path: output/report.html
          - name: diagnose
            args: diagnose
            artifact: diagnose-report
            path: output/diagnostic.md
          # Predictor-accuracy backtest against a completed tournament.
          - name: verify-womenseuro2025
            args: verify --config configs/womenseuro2025.yaml
            artifact: verify-womenseuro2025
            path: output/verify.md
          - name: verify-wc2022
            args: verify --config configs/wc2022.yaml
            artifact: verify-wc2022
            path: output/verify.md
          - name: verify-euro2024
            args: verify --config configs/euro2024.yaml
            artifact: verify-euro2024
            path: output/verify.md
          - name: verify-wc2018
            args: verify --config configs/wc2018.yaml
            artifact: verify-wc2018
            path: output/verify.md
          - name: verify-euro2020
            args: verify --config configs/euro2020.yaml
            artifact: verify-euro2020
            path: output/verify.md
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tippspiel ${{ matrix.args }}
        run: |
          mkdir -p output
          tippspiel ${{ matrix.args }} | tee "output/${{ matrix.name }}.log"
      - name: Upload ${{ matrix.artifact }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
