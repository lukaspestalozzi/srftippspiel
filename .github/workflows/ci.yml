name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install and test
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
          python -m pytest -rA

  artifacts:
    name: ${{ matrix.name }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # The prediction model is a required CLI parameter (no default); reports are built for
          # BOTH models. Default config (config.yaml = FIFA World Cup 2026) unless --config given.
          - name: validate-data
            args: validate-data
            artifact: validate-data-log
            path: output/validate-data.log
          # --- elo_poisson: the official eloratings snapshot (teams.csv) ---
          - name: predict-elo_poisson
            args: predict --predictor elo_poisson
            artifact: predict-elo_poisson-report
            path: output/report.html
          - name: run-elo_poisson
            args: run --predictor elo_poisson
            artifact: run-elo_poisson-report
            path: output/report.html
          - name: diagnose-elo_poisson
            args: diagnose --predictor elo_poisson
            artifact: diagnose-elo_poisson-report
            path: output/diagnostic.md
          # --- attack_defence_poisson: the computed two-rating model (teams_attack_defence.csv) ---
          - name: predict-attack_defence_poisson
            args: predict --predictor attack_defence_poisson
            artifact: predict-attack_defence_poisson-report
            path: output/report.html
          - name: run-attack_defence_poisson
            args: run --predictor attack_defence_poisson
            artifact: run-attack_defence_poisson-report
            path: output/report.html
          - name: diagnose-attack_defence_poisson
            args: diagnose --predictor attack_defence_poisson
            artifact: diagnose-attack_defence_poisson-report
            path: output/diagnostic.md
          # Rank-optimising strategy: tips that aim to WIN the pool by anticipating the field.
          - name: run-rankopt
            args: run --strategy rank_optimizing --predictor elo_poisson
            artifact: run-rankopt-report
            path: output/report.html
          # Predictor-accuracy backtests: each completed tournament x each model.
          - name: verify-euro2016-elo_poisson
            args: verify --config configs/euro2016.yaml --predictor elo_poisson
            artifact: verify-euro2016-elo_poisson
            path: output/verify.md
          - name: verify-euro2016-attack_defence_poisson
            args: verify --config configs/euro2016.yaml --predictor attack_defence_poisson
            artifact: verify-euro2016-attack_defence_poisson
            path: output/verify.md
          - name: verify-wc2022-elo_poisson
            args: verify --config configs/wc2022.yaml --predictor elo_poisson
            artifact: verify-wc2022-elo_poisson
            path: output/verify.md
          - name: verify-wc2022-attack_defence_poisson
            args: verify --config configs/wc2022.yaml --predictor attack_defence_poisson
            artifact: verify-wc2022-attack_defence_poisson
            path: output/verify.md
          - name: verify-euro2024-elo_poisson
            args: verify --config configs/euro2024.yaml --predictor elo_poisson
            artifact: verify-euro2024-elo_poisson
            path: output/verify.md
          - name: verify-euro2024-attack_defence_poisson
            args: verify --config configs/euro2024.yaml --predictor attack_defence_poisson
            artifact: verify-euro2024-attack_defence_poisson
            path: output/verify.md
          - name: verify-wc2018-elo_poisson
            args: verify --config configs/wc2018.yaml --predictor elo_poisson
            artifact: verify-wc2018-elo_poisson
            path: output/verify.md
          - name: verify-wc2018-attack_defence_poisson
            args: verify --config configs/wc2018.yaml --predictor attack_defence_poisson
            artifact: verify-wc2018-attack_defence_poisson
            path: output/verify.md
          - name: verify-euro2020-elo_poisson
            args: verify --config configs/euro2020.yaml --predictor elo_poisson
            artifact: verify-euro2020-elo_poisson
            path: output/verify.md
          - name: verify-euro2020-attack_defence_poisson
            args: verify --config configs/euro2020.yaml --predictor attack_defence_poisson
            artifact: verify-euro2020-attack_defence_poisson
            path: output/verify.md
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tippspiel ${{ matrix.args }}
        run: |
          mkdir -p output
          tippspiel ${{ matrix.args }} | tee "output/${{ matrix.name }}.log"
      - name: Upload ${{ matrix.artifact }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
