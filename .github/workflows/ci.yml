name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q

  artifacts:
    name: ${{ matrix.command }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - command: validate-data
            artifact: validate-data-log
            path: output/validate-data.log
          - command: predict
            artifact: predict-report
            path: output/report.html
          - command: run
            artifact: run-report
            path: output/report.html
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tippspiel ${{ matrix.command }}
        run: |
          mkdir -p output
          tippspiel ${{ matrix.command }} | tee "output/${{ matrix.command }}.log"
      - name: Upload ${{ matrix.artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
