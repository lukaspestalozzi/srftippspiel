# Which tournament bundle to use by default (tippspiel/data/tournaments/<name>/).
# Override on the CLI with --tournament <name>.
tournament: wc2026

predictor:
  name: elo_poisson
  params:
    mu: 2.6
    k: 0.0015
    gmax: 7
    rho: 0.0            # Dixon-Coles low-score correction; 0 = off
    host_elo_bonus: 0   # Elo-equivalent bonus, applied only at host-nation venues

strategy:
  name: expected_points

simulation:
  iterations: 50000
  seed: 20260611
  penalty_model: coin_flip   # coin_flip | elo_weighted

report:
  output_dir: output/
  display_timezone: Europe/Zurich

# Bonus questions are tournament-specific and now live in each tournament bundle's
# tournament.yaml (e.g. tippspiel/data/tournaments/wc2026/tournament.yaml).
