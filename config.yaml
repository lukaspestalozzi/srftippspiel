# Default tournament config (FIFA World Cup 2026). Each tournament is one config file;
# select another with --config configs/<name>.yaml.

predictor:
  # Targeted model x market blend (user-enabled 2026-06-10): pure Elo-Poisson everywhere,
  # except odds-backed fixtures where the model's 1X2 diverges from the de-vigged market by
  # > divergence_threshold on some outcome — there the market is pooled in at market_weight.
  # Backtest-neutral (see CLAUDE.md "Targeted variant"); enabled for live use because current
  # odds carry lineup/team news a pre-tournament Elo snapshot cannot. Elo params below are
  # the `tippspiel tune` result and feed the fallback unchanged.
  name: market_odds
  params:
    market_weight: 0.5         # market share of the log-linear pool on gated fixtures
    match_draw: true           # expansion also matches the de-vigged draw price
    divergence_threshold: 0.15 # gate: pure model below this model-vs-market 1X2 gap
    total_goals: 2.6           # expansion's assumed total when match_draw is false
    gmax: 7
    ko_goal_scale: 1.2         # knockout goal-rate multiplier (results are the 120-minute scoreline)
    fallback_params:
      mu: 2.6
      k: 0.002
      gmax: 7
      rho: -0.1            # Dixon-Coles low-score correction (negative lifts draws vs 1:0/0:1)
      host_elo_bonus: 40   # Elo-equivalent bonus when a team plays in its own country
      ko_goal_scale: 1.2
      alpha: 0.7           # off/def goal-volume weight (0 = pure Elo); see offdef: below + fit-offdef

# Offensive/defensive Elo: per-team att_elo/def_elo (in teams.csv) add the goal-VOLUME
# dimension a single Elo lacks, blended in via predictor.alpha above. `tippspiel fit-offdef`
# learns them from tippspiel/data/historical/international_results.csv up to the snapshot date
# (default: day before first kickoff) with these online-update hyperparameters. All optional —
# absent, the fitter uses these same defaults.
offdef:
  k_att: 0.02            # attack learning rate (per-match log-rate step)
  k_def: 0.02            # defence learning rate
  gamma_home: 0.2        # home-venue goal-rate bump used while fitting (non-neutral matches)
  epochs: 3              # chronological passes over the corpus
  residual_cap: 5.0      # clamp on a single match's goal residual (dampens blowouts)
  weights: { friendly: 0.5, qualifier: 2.5, continental: 3.0, world_cup: 4.0, default: 1.0 }
  # Live tournament: include matchday-1 results (11-12 June) in the off/def fit. The default
  # snapshot (day before first kickoff) is for leak-free backtests; wc2026 is live, not a
  # benchmark, so we deliberately fold in the games already played.
  snapshot_date: "2026-06-13"

simulation:
  iterations: 50000
  seed: 20260611
  penalty_model: coin_flip   # coin_flip | elo_weighted

report:
  output_dir: output/
  display_timezone: Europe/Zurich

strategy:
  # Realistic tips: among scorelines within this many pool-points of the EV optimum, pick the
  # one nearest the model's expected score. 0 = strict EV (~8% both-teams-score, ~89% shutouts);
  # 0.15 lifts both-teams-score tips to a realistic ~50% at a negligible (~1.5%) points cost.
  realism_tolerance: 0.15

tournament:
  name: wc2026
  display_name: FIFA World Cup 2026
  completed: false        # not yet played; results.csv is conditioned on as it fills
  data_dir: tournaments/wc2026   # relative to tippspiel/data/
  elo_source: "eloratings.net 12 June 2026 (men; post-matchday-1: MEX/RSA confirmed from the World.tsv feed; KOR/CZE via the K=60 formula, feed not yet processed)"
  odds_file: odds.csv     # ESPN public odds snapshot (DraftKings/Bet365 moneylines, de-vigged at load)
  # The knockout bracket (incl. the best-thirds slots and their allowed source groups) is
  # derived from fixtures.csv. An explicit third-place combination->slot table can be added
  # here once the official FIFA 'Annex C' is confirmed; absent, a constraint-respecting
  # bipartite matching is used (see tippspiel/simulation/bracket.py).
  # thirds_allocation_file: thirds_allocation.json

# Bonus questions are tournament-specific (SRF pool, Swiss-focused, German labels).
bonus_questions:
  - { id: champion, points: 50 }
  - { id: swiss_progress, points: 20 }    # how far Switzerland advances
  - { id: swiss_goals, points: 20 }        # total goals Switzerland scores (120-min)
  - { id: top_scorer_goals, points: 20 }   # Golden Boot tally (fixed historical prior)
  - { id: zero_zero_count, points: 20 }    # number of 0:0 matches (result after 120 min)
