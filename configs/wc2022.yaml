# FIFA World Cup 2022 (Qatar) — completed tournament, a `tippspiel verify` backtest benchmark.
# Run: tippspiel verify --config configs/wc2022.yaml
# Format: 32 teams, 8 groups of 4, top 2 advance (no thirds), R16 -> QF -> SF -> 3rd -> Final.

predictor:
  name: elo_poisson
  params:        # tuned via `tippspiel tune` (see config.yaml)
    mu: 2.6
    k: 0.002
    gmax: 7
    rho: -0.1
    host_elo_bonus: 40
    ko_goal_scale: 1.2

strategy:
  name: expected_points

simulation:
  iterations: 50000
  seed: 20260611
  penalty_model: coin_flip

report:
  output_dir: output/
  display_timezone: Europe/Zurich

tournament:
  name: wc2022
  display_name: FIFA World Cup 2022
  completed: true
  data_dir: tournaments/wc2022
  odds_file: odds.csv     # ESPN public odds snapshot (moneylines, de-vigged at load)
  # Pre-tournament men's Elo (eloratings.net-style, ~Nov 2022); approximate, provisional.
  # Pre-tournament so the verification backtest has no result leakage.
  elo_source: "eloratings.net men's snapshot ~Nov 2022; approximate, provisional"

bonus_questions:
  - { id: champion, points: 50 }
