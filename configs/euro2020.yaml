# UEFA Euro 2020 (played 2021, pan-European) — completed tournament, a `tippspiel verify`
# backtest benchmark. Run: tippspiel verify --config configs/euro2020.yaml
# Format: 24 teams, 6 groups of 4, top 2 + 4 best thirds advance, R16 -> QF -> SF -> Final
# (no third-place playoff). Multi-host, so venue_country is left blank (no single host nation).

predictor:
  name: elo_poisson
  params:        # tuned via `tippspiel tune` (see config.yaml)
    mu: 2.6
    k: 0.002
    gmax: 7
    rho: -0.1
    host_elo_bonus: 40
    ko_goal_scale: 1.2
    alpha: 0.7           # off/def goal-volume weight (att_elo/def_elo in teams.csv; see config.yaml)

simulation:
  iterations: 50000
  seed: 20260611
  penalty_model: coin_flip

report:
  output_dir: output/
  display_timezone: Europe/Zurich

strategy:
  realism_tolerance: 0.15   # realistic tips; 0 = strict EV (see config.yaml)

# Scalar base Elo: keep the committed eloratings snapshot (pre-tournament, leak-free). A
# from-scratch corpus fit is measurably less calibrated than eloratings on the backtests, so the
# verify/tune baseline stays on the external snapshot; only the live wc2026 uses source: corpus.
elo:
  source: external

tournament:
  name: euro2020
  display_name: UEFA Euro 2020
  completed: true
  data_dir: tournaments/euro2020
  odds_file: odds.csv     # ESPN public odds snapshot (moneylines, de-vigged at load)
  # Pre-tournament men's Elo (eloratings.net-style, ~June 2021); approximate, provisional.
  elo_source: "eloratings.net men's snapshot ~June 2021; approximate, provisional"

bonus_questions:
  - { id: champion, points: 50 }
