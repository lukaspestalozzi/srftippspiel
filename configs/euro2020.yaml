# UEFA Euro 2020 (played 2021, pan-European) — completed tournament, a `tippspiel verify`
# backtest benchmark. Run: tippspiel verify --config configs/euro2020.yaml
# Format: 24 teams, 6 groups of 4, top 2 + 4 best thirds advance, R16 -> QF -> SF -> Final
# (no third-place playoff). Multi-host, so venue_country is left blank (no single host nation).

predictors:        # no default model — pass --predictor elo_poisson | attack_defence_poisson
  elo_poisson:     # official eloratings snapshot (teams.csv); tuned via `tippspiel tune`
    mu: 2.6
    k: 0.002
    gmax: 7
    rho: -0.1
    host_elo_bonus: 40
    ko_goal_scale: 1.2
  attack_defence_poisson:   # computed two-rating model (teams_attack_defence.csv)
    rho: -0.1
    ko_goal_scale: 1.2
    base_log_rate: 0.3
    home_advantage: 0.0

strategy:
  name: expected_points

simulation:
  iterations: 50000
  seed: 20260611
  penalty_model: coin_flip

report:
  output_dir: output/
  display_timezone: Europe/Zurich

# Regenerate the attack/defence ratings read by attack_defence_poisson (--as-of defaults to the
# tournament's start − 1 day, so the backtest has no result leakage):
#   tippspiel build-elo --config configs/euro2020.yaml \
#     --write-teams tippspiel/data/tournaments/euro2020/teams_attack_defence.csv
elo:
  model: attack_defence
  recency_decay: false
  lookback_years: 200
  learning_rate: 0.03
  ad_home_advantage: 0.0

tournament:
  name: euro2020
  display_name: UEFA Euro 2020
  completed: true
  data_dir: tournaments/euro2020
  # Pre-tournament men's Elo (eloratings.net-style, ~June 2021); approximate, provisional.
  elo_source: "eloratings.net men's snapshot ~June 2021; approximate, provisional"

bonus_questions:
  - { id: champion, points: 50 }
